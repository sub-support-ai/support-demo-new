services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      AI_SERVICE_URL: http://host.docker.internal:8001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    # Сначала прогоняем миграции БД (alembic upgrade head), потом запускаем uvicorn.
    # Идемпотентно: если миграций нет — alembic ничего не делает.
    command: sh -c "python scripts/migrate.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  ai-worker:
    build: .
    restart: on-failure
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      AI_SERVICE_URL: http://host.docker.internal:8001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m app.workers.ai_worker

  sla-worker:
    build: .
    restart: on-failure
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      AI_SERVICE_URL: http://host.docker.internal:8001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m app.workers.sla_worker

  knowledge-embedding-worker:
    build: .
    restart: on-failure
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      AI_SERVICE_URL: http://host.docker.internal:8001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m app.workers.knowledge_embedding_worker

  # ── ai-service ─────────────────────────────────────────────────────────────
  # Локальный AI-сервис с Mistral (через Ollama / llama.cpp). По требованию
  # заказчика данные не покидают периметр — сервис крутится в соседнем контейнере,
  # а не в облаке.
  #
  # Этот блок намеренно закомментирован: образ и runtime-настройки собираются
  # AI-командой (отдельный репозиторий). Backend общается с сервисом только
  # через HTTP-контракт:
  #   POST /ai/classify  { ticket_id, title, body } → { category, priority, confidence, draft_response }
  #   POST /ai/answer    { conversation_id, messages } → { answer, confidence, should_escalate }
  #
  # Когда AI lead опубликует образ — раскомментируем и укажем конкретный тег.
  # Зависимость от GPU тоже его решение (CPU для dev, GPU в prod).
  #
  # ai-service:
  #   image: <registry>/<ai-service>:<tag>
  #   env_file:
  #     - .env
  #   ports:
  #     - "8001:8001"
  #   volumes:
  #     - ./models:/models  # модель монтируется, чтобы не скачивалась при каждом старте
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8001/healthcheck"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 60s   # Mistral прогревается дольше обычного HTTP-сервиса

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
